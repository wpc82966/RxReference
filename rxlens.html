<style>
:root{
  --navy:#0A2C5A;--navy-mid:#0F3D7A;--navy-light:#1A4F96;
  --gold:#F5C518;--teal:#2BDFB0;--red:#FF4F4F;--dim:#8FA3C0;
  --bg:#060F1E;--surface:#0D1F36;--surface2:#132840;--border:#1E3A57;
  --text:#E8F0FB;--text-dim:#8FA3C0;
  --bb-accent:#F5C518;--spp-accent:#2BDFB0;
  --r:14px;--r-sm:8px;--r-xs:5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,15,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0}
.topbar-inner{display:flex;align-items:center;gap:10px;padding:10px 14px}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo svg{width:28px;height:28px}
.logo-text{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.05rem;background:linear-gradient(90deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px 8px 32px;color:var(--text);font-size:.9rem;outline:none;font-family:'IBM Plex Sans',sans-serif}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--navy-light)}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:1rem;display:none}

/* lock status chip */
.lock-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:.72rem;font-weight:500;cursor:pointer;flex-shrink:0;transition:.15s;border:1px solid}
.lock-chip.locked{background:rgba(255,79,79,.1);color:#FF8080;border-color:rgba(255,79,79,.25)}
.lock-chip.unlocked{background:rgba(43,223,176,.1);color:var(--teal);border-color:rgba(43,223,176,.25)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:.78rem;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;transition:.15s}
.pill.active{color:var(--bg);border-color:transparent}
.pill[data-f="all"].active{background:var(--text);color:var(--bg)}
.pill[data-f="bb"].active{background:var(--bb-accent);color:var(--bg)}
.pill[data-f="spp"].active{background:var(--spp-accent);color:var(--bg)}
.pill[data-f="dual"].active{background:linear-gradient(90deg,var(--bb-accent),var(--spp-accent));color:var(--bg)}
.pill[data-f="supply"].active{background:#5A6A7E;color:var(--text)}

.stats-bar{padding:4px 14px 8px;font-size:.72rem;color:var(--dim)}
.stats-bar span{color:var(--text-dim)}

/* ── GRID ── */
#grid{flex:1;padding:10px 12px 80px;display:flex;flex-direction:column;gap:10px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.2s}
.card:hover{border-color:var(--navy-light)}
.card.dual{border-color:rgba(245,197,24,.25)}
.card.hidden{display:none}
.card-header{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 11px;cursor:pointer;user-select:none}
.type-badge{flex-shrink:0;padding:3px 8px;border-radius:4px;font-size:.65rem;font-weight:600;letter-spacing:.04em;margin-top:2px}
.type-badge.bb{background:rgba(245,197,24,.15);color:var(--bb-accent);border:1px solid rgba(245,197,24,.3)}
.type-badge.spp{background:rgba(43,223,176,.12);color:var(--spp-accent);border:1px solid rgba(43,223,176,.25)}
.type-badge.dual{background:linear-gradient(90deg,rgba(245,197,24,.15),rgba(43,223,176,.12));color:var(--gold);border:1px solid rgba(245,197,24,.3)}
.type-badge.supply{background:rgba(90,106,126,.2);color:#8FA3C0;border:1px solid rgba(90,106,126,.3)}
.card-title-wrap{flex:1;min-width:0}
.card-molecule{font-size:.78rem;color:var(--dim);font-weight:400;margin-bottom:2px}
.card-brand{font-size:1rem;font-weight:600;color:var(--text);line-height:1.2}
.card-mfr{font-size:.72rem;color:var(--dim);margin-top:2px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.jcode-badge{font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;padding:3px 7px;border-radius:4px;background:rgba(245,197,24,.12);color:var(--gold);border:1px solid rgba(245,197,24,.2)}
.jcode-badge.none{background:rgba(143,163,192,.08);color:var(--dim);border-color:rgba(143,163,192,.15)}
.jcode-badge.multi{font-size:.65rem;padding:3px 6px}
.chevron{color:var(--dim);font-size:.75rem;margin-top:4px;transition:.2s}
.card.open .chevron{transform:rotate(180deg)}

/* ── CARD BODY ── */
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}

/* ── DUAL TABS ── */
.dual-tabs{display:flex;border-bottom:1px solid var(--border)}
.dtab{flex:1;padding:9px 8px;font-size:.78rem;font-weight:500;text-align:center;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.dtab.active.bb{color:var(--bb-accent);border-color:var(--bb-accent)}
.dtab.active.spp{color:var(--spp-accent);border-color:var(--spp-accent)}
.dtab-panel{display:none;padding:12px 14px}
.dtab-panel.active{display:block}

/* ── SECTION LABEL ── */
.sec-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sec-label.bb{color:var(--bb-accent)}
.sec-label.spp{color:var(--spp-accent)}

/* ── NDC ROWS ── */
.ndc-list{display:flex;flex-direction:column;gap:8px}
.ndc-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 11px}
.ndc-name{font-size:.82rem;font-weight:500;margin-bottom:6px;color:var(--text)}
.ndc-code{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);margin-bottom:7px}

/* ── METRICS GRID ── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.metrics.four{grid-template-columns:repeat(4,1fr)}
.metric{background:var(--bg);border-radius:var(--r-xs);padding:6px 8px;text-align:center}
.metric-label{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;line-height:1.3}
.metric-val{font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:600}
.metric-val.gold{color:var(--gold)}
.metric-val.teal{color:var(--teal)}
.metric-val.red{color:var(--red)}
.metric-val.dim{color:var(--dim)}
.pos{color:var(--teal)}
.neg{color:var(--red)}

/* ── LOCKED CELL ── */
.metric-val.locked{color:rgba(143,163,192,.35);font-size:.75rem;letter-spacing:.05em}
.metric.locked-cell{border:1px dashed rgba(255,79,79,.2);background:rgba(255,79,79,.04);cursor:pointer}
.metric.locked-cell:hover{border-color:rgba(255,79,79,.4);background:rgba(255,79,79,.08)}
.metric.locked-cell .metric-label{color:rgba(255,79,79,.5)}

/* ── JCODE INFO ── */
.jcode-info{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--r-xs);padding:7px 9px;margin-bottom:8px}
.jcode-chip{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:600;color:var(--gold);background:rgba(245,197,24,.1);padding:3px 8px;border-radius:4px;flex-shrink:0}
.jcode-desc{font-size:.75rem;color:var(--text-dim)}
.jcode-unit{font-size:.7rem;color:var(--dim);margin-left:auto;flex-shrink:0}

/* ── NOTE BOX ── */
.note-box{margin-top:8px;background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.18);border-radius:var(--r-xs);padding:7px 9px;font-size:.74rem;color:var(--text-dim)}
.note-box::before{content:"⚠ ";color:var(--gold)}

/* ── SUPPLY ── */
.supply-body{padding:12px 14px}
.supply-list{display:flex;flex-direction:column;gap:6px}
.supply-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:var(--r-xs);padding:7px 10px}
.supply-name{font-size:.78rem;flex:1}
.supply-meta{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--dim);text-align:right}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:360px}
.modal h3{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.modal p{font-size:.78rem;color:var(--dim);margin-bottom:16px;line-height:1.5}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:.95rem;outline:none;margin-bottom:8px;font-family:'IBM Plex Sans',sans-serif}
.modal-input:focus{border-color:var(--navy-light)}
.modal-error{font-size:.75rem;color:var(--red);min-height:18px;margin-bottom:8px}
.modal-btns{display:flex;gap:8px}
.btn{flex:1;padding:10px;border-radius:var(--r-sm);font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:.15s;font-family:'IBM Plex Sans',sans-serif}
.btn-primary{background:var(--navy-light);color:var(--text)}
.btn-primary:hover{background:var(--navy-mid)}
.btn-secondary{background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
.btn-primary.loading{opacity:.6;cursor:wait}

/* ── EMPTY ── */
#empty{display:none;text-align:center;padding:60px 20px;color:var(--dim)}
#empty svg{opacity:.3;margin-bottom:12px}
#empty p{font-size:.9rem}

/* ── FOOTER ── */
.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(6,15,30,.97);border-top:1px solid var(--border);padding:6px 14px calc(6px + env(safe-area-inset-bottom,0));font-size:.65rem;color:var(--dim);text-align:center;z-index:50}

@media(min-width:600px){
  #grid{max-width:720px;margin:0 auto;width:100%}
  .metrics{grid-template-columns:repeat(4,1fr)}
}

/* ── WHITE BAG INDICATOR ── */
.wb-tag{display:inline-block;font-size:.6rem;font-weight:600;letter-spacing:.05em;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);text-transform:uppercase}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────
let decryptKey   = null;   // CryptoKey when unlocked
let unlocked     = false;

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmt(v){
  if(v==null||v===undefined||v==='')return'—';
  if(typeof v==='number') return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v;
}
function marginCls(v){ return v==null?'dim':v>=0?'pos':'neg'; }
function marginFmt(v){
  if(v==null)return'—';
  return(v>=0?'+':'')+v.toLocaleString('en-US',{style:'currency',currency:'USD'});
}

// ── CRYPTO ────────────────────────────────────────────────────────────────
function b64ToBytes(b64){ return Uint8Array.from(atob(b64),c=>c.charCodeAt(0)); }

async function deriveKey(password){
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64ToBytes(SALT_B64),iterations:ITERATIONS,hash:'SHA-256'},
    raw,{name:'AES-GCM',length:256},false,['decrypt']
  );
}

async function decryptVal(b64ct, key){
  if(!b64ct) return null;
  try {
    const buf    = b64ToBytes(b64ct);
    const nonce  = buf.slice(0,12);
    const ct     = buf.slice(12);
    const plain  = await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce},key,ct);
    const str    = new TextDecoder().decode(plain);
    return parseFloat(str);
  } catch(e){ return null; }
}

// Decrypt all encrypted fields in the groups copy
async function decryptGroups(key){
  const decrypted = JSON.parse(JSON.stringify(GROUPS)); // deep clone
  for(const g of decrypted){
    if(g.bb?.ndcs) for(const n of g.bb.ndcs){
      n.b340   = await decryptVal(n.b340_enc,   key);
      n.margin = await decryptVal(n.margin_enc, key);
    }
    if(g.spp?.ndcs) for(const n of g.spp.ndcs){
      n.b340   = await decryptVal(n.b340_enc,   key);
      n.margin = await decryptVal(n.margin_enc, key);
    }
    if(g.ndcs) for(const n of g.ndcs){
      n.b340 = await decryptVal(n.b340_enc, key);
    }
  }
  return decrypted;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function showUnlock(){ 
  if(unlocked){ lockIt(); return; }
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').textContent='';
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') attemptUnlock(); });

async function attemptUnlock(){
  const pw = document.getElementById('pw-input').value.trim();
  if(!pw){ document.getElementById('pw-error').textContent='Please enter a password.'; return; }
  const btn = document.getElementById('unlock-btn');
  btn.textContent='Verifying…'; btn.classList.add('loading');
  try{
    const key = await deriveKey(pw);
    // Verify against first known encrypted value — if decrypt works, password is correct
    const testVal = GROUPS[0]?.bb?.ndcs?.[0]?.b340_enc || GROUPS[0]?.spp?.ndcs?.[0]?.b340_enc;
    const test = await decryptVal(testVal, key);
    if(test===null || isNaN(test)){
      document.getElementById('pw-error').textContent='Incorrect password. Try again.';
      btn.textContent='Unlock'; btn.classList.remove('loading');
      return;
    }
    decryptKey = key;
    unlocked   = true;
    closeModal();
    await refreshWithDecryption();
    setLockUI(true);
  } catch(e){
    document.getElementById('pw-error').textContent='Incorrect password. Try again.';
  }
  btn.textContent='Unlock'; btn.classList.remove('loading');
}

function lockIt(){
  unlocked=false; decryptKey=null;
  renderAll(GROUPS);
  setLockUI(false);
}

function setLockUI(on){
  const chip  = document.getElementById('lock-chip');
  const icon  = document.getElementById('lock-icon');
  const label = document.getElementById('lock-label');
  if(on){
    chip.className='lock-chip unlocked';
    icon.textContent='🔓'; label.textContent='Unlocked';
    chip.title='Click to lock';
  } else {
    chip.className='lock-chip locked';
    icon.textContent='🔒'; label.textContent='Locked';
    chip.title='Unlock 340B pricing';
  }
}

async function refreshWithDecryption(){
  const decGroups = await decryptGroups(decryptKey);
  renderAll(decGroups);
}

}

      ${jcode&&jcode!==defaultJcode?`<div style="margin-bottom:6px"><span class="jcode-chip" style="font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;color:var(--gold);background:rgba(245,197,24,.1);padding:2px 7px;border-radius:4px">${jcode}</span></div>`:''}
      <div class="metrics four">
        ${metricCell('Bill Units/Pkg', n.billUnits||'—', 'gold')}
        ${metricCell('ASP Est. Reimb./Pkg', fmt(n.aspPkg), 'gold')}
        ${b340Avail   ? metricCell('340B Price', fmt(n.b340),   'teal') : lockedCell('340B Price')}
        ${marginAvail ? metricCell('B&amp;B Margin', marginFmt(n.margin), marginCls(n.margin)) : lockedCell('B&amp;B Margin')}
      </div>
    </div>`;
  }).join('');
}

function buildSPPNdcRows(ndcs, isUnlocked){
  return ndcs.map(n=>{
    const b340Avail   = isUnlocked && n.b340!=null;
    const marginAvail = isUnlocked && n.margin!=null;
    const isWB = n.name.includes('— White Bag');
    const displayName = isWB ? n.name.replace('— White Bag','').trim() : n.name;
    const wbTag = isWB ? '<span class="wb-tag">White Bag</span>' : '';
    return`<div class="ndc-row">
      <div class="ndc-name">${displayName}${wbTag}</div>
      <div class="ndc-code">NDC: ${n.ndc} · ${n.pkg||''}</div>
      <div class="metrics four">
        ${metricCell('WAC/Pkg', fmt(n.wac), 'dim')}
        ${metricCell('Est. Reimb. 85% WAC', fmt(n.reimb), 'teal')}
        ${b340Avail   ? metricCell('340B Price', fmt(n.b340),   'gold') : lockedCell('340B Price')}
        ${marginAvail ? metricCell('SPP Margin', marginFmt(n.margin), marginCls(n.margin)) : lockedCell('SPP Margin')}
      </div>
    </div>`;
  }).join('');
}

function buildSupplyRows(ndcs, isUnlocked){
  return`<div class="supply-body"><div class="supply-list">` +
    ndcs.map(n=>`<div class="supply-row">
      <div>
        <div class="supply-name">${n.name}</div>
        <div class="ndc-code" style="margin:2px 0 0">NDC: ${n.ndc}${n.pkg?' · '+n.pkg:''}</div>
      </div>
      <div class="supply-meta">
        ${isUnlocked && n.b340!=null ? fmt(n.b340)
          : n.b340_enc ? '<span style="color:rgba(143,163,192,.35);cursor:pointer" onclick="showUnlock()">🔒 ••••</span>'
          : 'No price'}
      </div>
    </div>`).join('') +
  `</div></div>`;
}

function getJcodeDisplay(g){
  if(g.type==='bb'||g.type==='dual'){
    const bb=g.bb;
    if(!bb.jcode)return{text:'No Code',cls:'none'};
    if(bb.jcode.includes('/'))return{text:bb.jcode,cls:'multi'};
    const codes=[...new Set(bb.ndcs.map(n=>n.jcode||bb.jcode))];
    if(codes.length>1)return{text:codes[0]+'…',cls:'multi'};
    return{text:codes[0],cls:''};
  }
  if(g.type==='spp')return{text:'SPP/CP',cls:'none'};
  return{text:'Supply',cls:'none'};
}

function renderCard(g, isUnlocked){
  const jd=getJcodeDisplay(g);
  const typeLabelMap={bb:'B&B',spp:'SPP/CP',dual:'B&B + SPP',supply:'Supply'};
  const typeBadge=`<span class="type-badge ${g.type}">${typeLabelMap[g.type]||g.type}</span>`;
  const jBadge=`<span class="jcode-badge${jd.cls?' '+jd.cls:''}">${jd.text}</span>`;

  let body='';
  if(g.type==='supply'){
    body=`<div class="card-body">${buildSupplyRows(g.ndcs,isUnlocked)}</div>`;
  } else if(g.type==='bb'){
    const bb=g.bb;
    body=`<div class="card-body"><div style="padding:12px 14px">
      <div class="sec-label bb">Buy &amp; Bill</div>
      ${buildJcodeInfo(bb.jcode,bb.jdesc,bb.billUnit)}
      <div class="ndc-list">${buildBBNdcRows(bb.ndcs,bb.jcode,isUnlocked)}</div>
      ${g.notes?`<div class="note-box">${g.notes}</div>`:''}
    </div></div>`;
  } else if(g.type==='spp'){
    const sp=g.spp;
    body=`<div class="card-body"><div style="padding:12px 14px">
      <div class="sec-label spp">Specialty Pharmacy / Contract Pharmacy · Est. Reimb. 85% WAC</div>
      <div class="ndc-list">${buildSPPNdcRows(sp.ndcs,isUnlocked)}</div>
      ${g.notes?`<div class="note-box">${g.notes}</div>`:''}
    </div></div>`;
  } else if(g.type==='dual'){
    const bb=g.bb, sp=g.spp;
    body=`<div class="card-body">
      <div class="dual-tabs">
        <div class="dtab active bb" data-tab="bb" onclick="switchTab(this)">⊕ Buy &amp; Bill</div>
        <div class="dtab spp" data-tab="spp" onclick="switchTab(this)">◎ SPP / CP</div>
      </div>
      <div class="dtab-panel active" id="tp-bb-${g.id}">
        ${buildJcodeInfo(bb.jcode,bb.jdesc,bb.billUnit)}
        <div class="ndc-list">${buildBBNdcRows(bb.ndcs,bb.jcode,isUnlocked)}</div>
        ${g.notes?`<div class="note-box">${g.notes}</div>`:''}
      </div>
      <div class="dtab-panel" id="tp-spp-${g.id}">
        <div class="sec-label spp" style="margin-bottom:8px">Est. Reimb. 85% WAC</div>
        <div class="ndc-list">${buildSPPNdcRows(sp.ndcs,isUnlocked)}</div>
      </div>
    </div>`;
  }

  return`<div class="card ${g.type}${g.type==='dual'?' dual':''}" id="card-${g.id}" data-type="${g.type}" data-search="${buildSearchStr(g)}">
    <div class="card-header" onclick="toggleCard('${g.id}')">
      ${typeBadge}
      <div class="card-title-wrap">
        ${g.molecule?`<div class="card-molecule">${g.molecule}</div>`:''}
        <div class="card-brand">${g.brand}</div>
        <div class="card-mfr">${g.mfr}</div>
      </div>
      <div class="card-right">${jBadge}<span class="chevron">▼</span></div>
    </div>
    ${body}
  </div>`;
}

function buildSearchStr(g){
  const parts=[g.molecule||'',g.brand||'',g.mfr||'',g.type];
  if(g.bb) parts.push(g.bb.jcode||''), g.bb.ndcs.forEach(n=>parts.push(n.ndc,n.name,n.jcode||''));
  if(g.spp) g.spp.ndcs.forEach(n=>parts.push(n.ndc,n.name));
  if(g.ndcs) g.ndcs.forEach(n=>parts.push(n.ndc,n.name));
  return parts.join(' ').toLowerCase();
}

// Track open cards across re-renders
let openCards = new Set();
function toggleCard(id){
  const el=document.getElementById('card-'+id);
  el.classList.toggle('open');
  if(el.classList.contains('open')) openCards.add(id); else openCards.delete(id);
}
function switchTab(btn){
  const cb=btn.closest('.card-body');
  cb.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const cid=btn.closest('.card').id.replace('card-','');
  cb.querySelectorAll('.dtab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tp-'+btn.dataset.tab+'-'+cid).classList.add('active');
}

function renderAll(groups){
  const grid=document.getElementById('grid');
  const isU=unlocked;
  grid.innerHTML=groups.map(g=>renderCard(g,isU)).join('');
  // Restore open state
  openCards.forEach(id=>{ const el=document.getElementById('card-'+id); if(el) el.classList.add('open'); });
  applyFilters();
  updateStats(groups);
}

function updateStats(groups){
  const cards=document.querySelectorAll('#grid .card:not(.hidden)');
  const counts={bb:0,spp:0,dual:0,supply:0};
  cards.forEach(c=>{const t=c.dataset.type;if(t in counts)counts[t]++;});
  document.getElementById('stats-bar').innerHTML=
    `<span>${cards.length}</span> shown · <span>${counts.bb}</span> B&B · <span>${counts.spp}</span> SPP · <span>${counts.dual}</span> dual · <span>${counts.supply}</span> supply`;
}

// ── FILTER & SEARCH ───────────────────────────────────────────────────────
let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    activeFilter=p.dataset.f;
    applyFilters();
  });
});

const searchEl=document.getElementById('search');
const clearBtn=document.getElementById('clear-btn');
searchEl.addEventListener('input',()=>{
  clearBtn.style.display=searchEl.value?'block':'none';
  applyFilters();
});
clearBtn.addEventListener('click',()=>{ searchEl.value=''; clearBtn.style.display='none'; applyFilters(); });

function applyFilters(){
  const q=searchEl.value.toLowerCase().trim();
  let visible=0;
  document.querySelectorAll('#grid .card').forEach(card=>{
    const show=(activeFilter==='all'||card.dataset.type===activeFilter)&&(!q||card.dataset.search.includes(q));
    card.classList.toggle('hidden',!show);
    if(show)visible++;
  });
  document.getElementById('empty').style.display=visible?'none':'block';
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

// Initial render (locked) — must be last, after all functions and consts are declared
renderAll(GROUPS);

// ── SERVICE WORKER ────────────────────────────────────────────────────────
if('serviceWorker' in navigator && location.protocol==='https:' && !location.hostname.includes('raw.githubusercontent')){
  const sw=`const C='rxlens-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
