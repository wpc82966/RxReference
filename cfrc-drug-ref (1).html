<style>
:root {
  --navy:      #0A2C5A;
  --navy-mid:  #0E3A72;
  --blue:      #1A5EA8;
  --accent:    #F5C518;
  --accent2:   #2BDFB0;
  --bg:        #060F1E;
  --surface:   #0D1E35;
  --surface2:  #132844;
  --border:    #1E3A5F;
  --text:      #E8EFF8;
  --text-dim:  #7A9EC0;
  --text-muted:#3D6080;
  --red:       #FF5A6A;
  --green:     #2BDFB0;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 0) 0 0;
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
}

.logo {
  width: 36px;
  height: 36px;
  background: var(--navy-mid);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.logo svg { width: 20px; height: 20px; }

.header-text h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text);
  line-height: 1.2;
}

.header-text p {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: var(--mono);
  margin-top: 1px;
}

/* ── SEARCH ── */
.search-wrap {
  padding: 0 16px 12px;
  position: relative;
}

#search {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px; /* prevents iOS zoom */
  padding: 11px 40px 11px 42px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text-muted); font-size: 14px; }

.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}

.clear-btn {
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface2);
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}

.clear-btn.visible { display: flex; }

/* ── FILTER PILLS ── */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 0 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.pill.active { background: var(--navy); border-color: var(--accent); color: var(--accent); }

/* ── COUNT BAR ── */
.count-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 8px;
}

.count-text {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.count-num {
  font-weight: 600;
  color: var(--accent);
}

/* ── RESULTS LIST ── */
#results {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 12px;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

/* ── DRUG CARD ── */
.drug-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
  cursor: pointer;
}

.drug-card:active { border-color: var(--accent); background: var(--surface2); }
.drug-card.supply { border-color: #2A1A1F; }

.card-top {
  padding: 12px 14px 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.jcode-badge {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 7px;
  background: var(--navy);
  border: 1px solid var(--accent);
  color: var(--accent);
  letter-spacing: 0.04em;
  margin-top: 1px;
  min-width: 52px;
  text-align: center;
}

.jcode-badge.supply-badge {
  background: #1A0A0E;
  border-color: #3D1A22;
  color: var(--text-muted);
}

.card-name {
  flex: 1;
  min-width: 0;
}

.drug-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: 0.01em;
}

.drug-mfr {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0.03em;
}

/* ── STATS ROW ── */
.stats-row {
  display: flex;
  border-top: 1px solid var(--border);
}

.stat {
  flex: 1;
  padding: 8px 10px;
  border-right: 1px solid var(--border);
  min-width: 0;
}
.stat:last-child { border-right: none; }

.stat-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.stat-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-val.money { color: var(--accent2); }
.stat-val.ndc   { font-size: 10px; letter-spacing: 0.02em; }

/* ── EXPANDED DETAIL ── */
.card-detail {
  display: none;
  padding: 0 14px 12px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.card-detail.open { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.detail-item { }

.detail-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.detail-val {
  font-size: 12px;
  color: var(--text);
  font-family: var(--mono);
}

.detail-val.wide { grid-column: span 2; font-size: 11px; color: var(--text-dim); font-family: var(--sans); }
.detail-val.highlight { color: var(--accent2); }
.detail-val.margin-pos { color: var(--green); }
.detail-val.margin-neg { color: var(--red); }

.expand-hint {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  text-align: center;
  padding: 4px 0 0;
  letter-spacing: 0.04em;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 30px;
}

.empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

.empty h3 {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.empty p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ── SUPPLY TAG ── */
.supply-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #1A0A0E;
  color: #FF8A95;
  border: 1px solid #3D1A22;
  letter-spacing: 0.05em;
  margin-top: 3px;
}

/* ── HIGHLIGHT ── */
mark {
  background: rgba(245, 197, 24, 0.3);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 1px;
}

/* ── SCROLLBAR ── */
#results::-webkit-scrollbar { width: 3px; }
#results::-webkit-scrollbar-track { background: transparent; }
#results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

const fmt$ = v => v == null ? '—' : '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmt3 = v => v == null ? '—' : '$' + v.toLocaleString('en-US', {minimumFractionDigits:3, maximumFractionDigits:3});

let currentFilter = 'all';
let expandedIdx = null;

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function renderCards(filtered, query) {
  const container = document.getElementById('results');
  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>No results found</h3>
        <p>Try searching by drug name,<br>J-code, or NDC number.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(({drug, origIdx}) => {
    const isExpanded = expandedIdx === origIdx;
    const hl = t => highlight(String(t), query);
    const marginClass = drug.margin > 0 ? 'margin-pos' : drug.margin < 0 ? 'margin-neg' : '';

    return `
    <div class="drug-card ${drug.supply ? 'supply' : ''}" data-idx="${origIdx}" onclick="toggleCard(${origIdx})">
      <div class="card-top">
        <div class="jcode-badge ${drug.supply ? 'supply-badge' : ''}">${hl(drug.jcode)}</div>
        <div class="card-name">
          <div class="drug-name">${hl(drug.name)}</div>
          <div class="drug-mfr">${drug.mfr}${drug.supply ? ' <span class="supply-tag">NO J-CODE</span>' : ''}</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">NDC</div>
          <div class="stat-val ndc">${hl(drug.ndc)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Limit / Unit</div>
          <div class="stat-val money">${drug.aspLimit != null ? fmt3(drug.aspLimit) : '—'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Reimb / Pkg</div>
          <div class="stat-val money">${fmt$(drug.aspPkg)}</div>
        </div>
      </div>
      <div class="card-detail ${isExpanded ? 'open' : ''}">
        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-label">Package</div>
            <div class="detail-val">${drug.pkg}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Billing Unit</div>
            <div class="detail-val">${drug.billUnit}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Drug MG / Pkg</div>
            <div class="detail-val">${drug.mgPkg}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Bill Units / Pkg</div>
            <div class="detail-val">${drug.billUnits}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">340B Price / Pkg</div>
            <div class="detail-val highlight">${fmt$(drug.b340)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">B&B Margin / Pkg</div>
            <div class="detail-val ${marginClass}">${fmt$(drug.margin)}</div>
          </div>
          <div class="detail-item" style="grid-column:span 2">
            <div class="detail-label">HCPCS Description</div>
            <div class="detail-val" style="font-family:var(--sans);color:var(--text-dim);font-size:11px">${drug.jdesc}</div>
          </div>
          ${drug.notes ? `<div class="detail-item" style="grid-column:span 2"><div class="detail-label">Notes</div><div class="detail-val wide">${drug.notes}</div></div>` : ''}
        </div>
      </div>
      <div class="expand-hint">${isExpanded ? '▲ collapse' : '▼ tap to expand'}</div>
    </div>`;
  }).join('');
}

function toggleCard(origIdx) {
  expandedIdx = (expandedIdx === origIdx) ? null : origIdx;
  doSearch();
}

function doSearch() {
  const raw   = document.getElementById('search').value.trim().toLowerCase();
  const clear = document.getElementById('clearBtn');
  clear.classList.toggle('visible', raw.length > 0);

  let filtered = DRUGS.map((drug, origIdx) => ({drug, origIdx}));

  if (currentFilter === 'drug')   filtered = filtered.filter(({drug}) => !drug.supply);
  if (currentFilter === 'supply') filtered = filtered.filter(({drug}) => drug.supply);

  if (raw) {
    filtered = filtered.filter(({drug}) =>
      drug.name.toLowerCase().includes(raw)  ||
      drug.jcode.toLowerCase().includes(raw) ||
      drug.ndc.includes(raw)                 ||
      drug.mfr.toLowerCase().includes(raw)   ||
      drug.jdesc.toLowerCase().includes(raw)
    );
  }

  renderCards(filtered, raw);
}

document.getElementById('search').addEventListener('input', doSearch);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  doSearch();
  document.getElementById('search').focus();
});

document.getElementById('filterRow').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  currentFilter = pill.dataset.filter;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p === pill));
  expandedIdx = null;
  doSearch();
});

// Initial render
doSearch();
</script>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([sw], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
